  shared_preferences: ^2.2.2
  wildlifenl_login_components:
    git:
      url: https://github.com/WildLife-NL/wildlifenl-components.git
      ref: Wildlife-rapport-Components
      path: wildlifenl_login_components
  wildlifenl_map_logic_components:
    git:
      url: https://github.com/WildLife-NL/wildlifenl-components.git
      ref: Wildlife-rapport-Components
      path: wildlifenl_map_logic_components
  wildlifenl_map_ui_components:
    git:
      url: https://github.com/WildLife-NL/wildlifenl-components.git
      ref: Wildlife-rapport-Components
      path: wildlifenl_map_ui_components
  wildlifenl_interaction_components:
    git:
      url: https://github.com/WildLife-NL/wildlifenl-components.git
      ref: Wildlife-rapport-Components
      path: wildlifenl_interaction_components
  wildlifenl_detection_components:
    git:
      url: https://github.com/WildLife-NL/wildlifenl-components.git
      ref: Wildlife-rapport-Components
      path: wildlifenl_detection_components
  wildlifenl_visitation_components:
    git:
      url: https://github.com/WildLife-NL/wildlifenl-components.git
      ref: Wildlife-rapport-Components
      path: wildlifenl_visitation_components
  wildlifenl_assets:
    git:
      url: https://github.com/WildLife-NL/wildlifenl-components.git
      ref: Wildlife-rapport-Components
      path: wildlifenl_assets_components

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
